<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>360 Drone Panorama Viewer</title>
    <!-- A-Frame library for 360/VR -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <!-- Load custom font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Upload Interface -->
    <div id="upload-container" class="active aurora-bg">
        <div class="glass-panel">
            <h1>360 Panorama Viewer</h1>
            <p>Upload a panoramic image or video from your DJI / Insta360</p>
            
            <div class="drop-zone" id="drop-zone">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                <span class="drop-text">Drag & Drop or Click to Browse</span>
                <span class="supported-formats">Supports MP4, WEBM, JPG, PNG</span>
                <input type="file" id="file-input" accept="image/*,video/*">
            </div>
        </div>
    </div>

    <!-- Gyroscope Permission Overlay (hidden by default) -->
    <div id="gyro-overlay">
        <div class="glass-panel">
            <h2>Enable Motion Controls</h2>
            <p>To look around by moving your phone, please grant gyroscope access.</p>
            <button id="enable-gyro-btn" class="upload-btn">Enable Gyroscope</button>
            <button id="skip-gyro-btn" class="skip-btn">Skip</button>
        </div>
    </div>

    <!-- 360 Viewer (hidden by default) -->
    <div id="viewer-container">
        <!-- A-Frame scene will be injected here dynamically -->
        <div id="scene-wrapper" style="width: 100%; height: 100%;"></div>
        
        <!-- UI Overlay inside viewer -->
        <div class="viewer-controls">
            <button id="fullscreen-btn" class="control-btn">⛶ Fullscreen</button>
            <button id="close-viewer-btn" class="control-btn close-btn">✕ Close Viewer</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
